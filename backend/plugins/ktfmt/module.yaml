product: jvm/amper-plugin

description: Checks and applies the repository's canonical Kotlin formatting with ktfmt.

pluginInfo:
  settingsClass: shop.voenix.ktfmt.KtfmtSettings

dependencies:
  - $libs.ktfmt
  # The Kotlin Toolchain runs plugins on a compact JRE without jdk.compiler.
  - $libs.errorprone.javac
