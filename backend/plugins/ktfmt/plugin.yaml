tasks:
  checkFormat:
    action: !shop.voenix.ktfmt.checkKtfmt
      sources: ${module.kotlinJavaSources}
      additionalSourceRoots:
        - ${module.rootDir}/test
      pluginSourceRoot: ${project.rootDir}/plugins
      includePluginSources: ${pluginSettings.includePluginSources}

  format:
    action: !shop.voenix.ktfmt.formatKtfmt
      sources: ${module.kotlinJavaSources}
      additionalSourceRoots:
        - ${module.rootDir}/test
      pluginSourceRoot: ${project.rootDir}/plugins
      includePluginSources: ${pluginSettings.includePluginSources}

checks:
  - name: ktfmt
    performedBy: checkFormat

commands:
  - name: ktfmt
    performedBy: format
