<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <style>
    @page { size: A4; margin: 36pt; }
    body { font-family: Arial, sans-serif; color: #252f3f; }
    .hero { background: #235ead; color: white; padding: 22pt; border-radius: 3pt; }
    h1 { font-size: 22pt; margin: 0 0 8pt; }
    table { width: 100%; border-collapse: collapse; margin-top: 28pt; }
    th { text-align: left; background: #eef3fb; padding: 8pt; }
    td { border-bottom: 1pt solid #d8dee9; padding: 8pt; }
    .num { text-align: right; }
    .total { font-weight: bold; font-size: 14pt; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Fixture invoice</h1>
    <div>Expected source behavior: blue header, two item rows, right-aligned totals.</div>
  </section>
  <table>
    <thead>
      <tr><th>Item</th><th class="num">Qty</th><th class="num">Line</th></tr>
    </thead>
    <tbody>
      <tr><td>Ceramic mug run</td><td class="num">2</td><td class="num">EUR 36.80</td></tr>
      <tr><td>Poster set</td><td class="num">4</td><td class="num">EUR 59.40</td></tr>
      <tr class="total"><td colspan="2">Total</td><td class="num">Total EUR 96.20</td></tr>
    </tbody>
  </table>
</body>
</html>
