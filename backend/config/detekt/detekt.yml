# Start with Detekt's recommended defaults and keep only deliberate differences here.
config:
  validation: true
  # A renamed or removed rule must break the quality gate during upgrades.
  warningsAsErrors: true

complexity:
  CyclomaticComplexMethod:
    # Route composition is an explicit decision table in this backend.
    allowedComplexity: 20
  LongMethod:
    # Scenario tests are more readable as complete workflows.
    excludes: ['**/test/**']
  TooManyFunctions:
    # A use-case service may keep a small set of private validation and error-mapping helpers.
    allowedFunctionsPerClass: 15

coroutines:
  InjectDispatcher:
    # CountryRepository is the single I/O boundary and deliberately owns Dispatchers.IO.
    active: false

exceptions:
  TooGenericExceptionCaught:
    # Startup cleanup, the country and account database boundaries, the account mail policy
    # (best-effort and enumeration-safe deliveries), and the production-PDF renderer must map
    # every unexpected failure to a safe result instead of crashing.
    excludes:
      [
        '**/Application.kt',
        '**/CountryService.kt',
        '**/ProductionPdfRenderer.kt',
        '**/AccountService.kt',
        '**/AccountMailer.kt',
      ]

style:
  MaxLineLength:
    # ktfmt is the only authority for line wrapping and uses 100 columns.
    active: false
  UnusedImport:
    # Detekt 2.0 can misclassify imports without complete type information.
    active: false
  ReturnCount:
    # Early validation/authentication exits are guard clauses, not branching business logic.
    excludeGuardClauses: true
