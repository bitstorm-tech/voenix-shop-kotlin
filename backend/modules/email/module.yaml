product: jvm/lib

apply:
  - ../../backend.module-template.yaml

plugins:
  detekt: enabled
  ktfmt: enabled
  ktlint: enabled

dependencies:
  - ../platform
  - $libs.exposed.core
  - $libs.exposed.jdbc
  - $libs.exposed.java.time
  - $libs.ktor.client.cio
  - $libs.ktor.client.content.negotiation
  - $libs.ktor.client.core
  - $libs.ktor.serialization.json
  - $libs.ktor.server.core
  - $libs.kotlinx.html
  - $libs.slf4j.api

test-dependencies:
  - ../test-support
  - $libs.ktor.client.mock
  - $libs.ktor.server.test.host

settings:
  kotlin:
    serialization:
      format: json
      version: 1.11.0
