ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }

  application {
    modules = [ shop.voenix.ApplicationKt.module ]
  }
}

Database {
  Host = ""
  Host = ${?DATABASE_HOST}
  Host = ${?Database__Host}

  Port = 5432
  Port = ${?DATABASE_PORT}
  Port = ${?Database__Port}

  Database = ""
  Database = ${?DATABASE_NAME}
  Database = ${?Database__Database}

  Username = ""
  Username = ${?DATABASE_USERNAME}
  Username = ${?Database__Username}

  Password = ""
  Password = ${?DATABASE_PASSWORD}
  Password = ${?Database__Password}

  SearchPath = "voenix"
  SearchPath = ${?DATABASE_SEARCH_PATH}
  SearchPath = ${?Database__SearchPath}

  SslMode = "Disable"
  SslMode = ${?DATABASE_SSL_MODE}
  SslMode = ${?Database__SslMode}

  MaximumPoolSize = 100
  MaximumPoolSize = ${?DATABASE_MAX_POOL_SIZE}
  MaximumPoolSize = ${?Database__MaximumPoolSize}
}

Auth {
  SessionSecret = ""
  SessionSecret = ${?AUTH_SESSION_SECRET}
  SessionSecret = ${?Auth__SessionSecret}
}
