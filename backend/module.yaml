product: jvm/app

plugins:
  ktlint: enabled

dependencies:
  - io.ktor:ktor-server-core-jvm:3.5.1
  - io.ktor:ktor-server-netty-jvm:3.5.1
  - ch.qos.logback:logback-classic:1.5.18: runtime-only

test-dependencies:
  - io.ktor:ktor-server-test-host-jvm:3.5.1

settings:
  kotlin:
    version: 2.4.0
  jvm:
    release: 17
    mainClass: io.ktor.server.netty.EngineMain
  ktor:
    enabled: true
    version: 3.5.1
