product: jvm/app

dependencies:
  - io.ktor:ktor-server-core-jvm:3.5.1
  - io.ktor:ktor-server-netty-jvm:3.5.1
  - io.ktor:ktor-server-auth-jvm:3.5.1
  - io.ktor:ktor-server-sessions-jvm:3.5.1
  - com.zaxxer:HikariCP:7.0.2
  - org.postgresql:postgresql:42.7.8
  - org.flywaydb:flyway-core:12.10.0
  - org.flywaydb:flyway-database-postgresql:12.10.0
  - org.jetbrains.exposed:exposed-core:1.3.1
  - org.jetbrains.exposed:exposed-jdbc:1.3.1
  - ch.qos.logback:logback-classic:1.5.18: runtime-only

test-dependencies:
  - io.ktor:ktor-server-test-host-jvm:3.5.1
  - org.testcontainers:testcontainers-junit-jupiter:2.0.5
  - org.testcontainers:testcontainers-postgresql:2.0.5
  - org.apache.pdfbox:pdfbox:3.0.7
  - io.github.openhtmltopdf:openhtmltopdf-pdfbox:1.1.40
  - com.sksamuel.scrimage:scrimage-webp:4.6.2

settings:
  kotlin:
    version: 2.4.0
    serialization:
      format: json
      version: 1.11.0
  jvm:
    release: 17
    mainClass: io.ktor.server.netty.EngineMain
  ktor:
    enabled: true
    version: 3.5.1
